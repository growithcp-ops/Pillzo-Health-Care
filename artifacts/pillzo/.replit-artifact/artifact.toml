kind = "web"
previewPath = "/"
title = "Pillzo - Healthcare Website"
version = "1.0.0"
id = "artifacts/pillzo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22787

[services.development]
run = "pnpm --filter @workspace/pillzo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pillzo", "run", "build" ]
publicDir = "artifacts/pillzo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22787"
BASE_PATH = "/"
